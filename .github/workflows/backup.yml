name: Firebase Backup

on:
  schedule:
    - cron: "*/1 * * * *"
  workflow_dispatch:

jobs:
  backup:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Download Firebase JSON
        run: |
          mkdir -p backups
          curl https://opjat-2005-default-rtdb.asia-southeast1.firebasedatabase.app/.json > backups/backup_$(date +%s).json

      - name: Keep only last 10 backups
        run: |
          ls -t backups | tail -n +11 | xargs -I {} rm backups/{}

      - name: Commit changes
        run: |
          git config --global user.name "backup-bot"
          git config --global user.email "backup@github.com"
          git add .
          git commit -m "Auto backup"
          git push

name: Firebase Backup

on:
  schedule:
    - cron: "0 */23 * * *"

  workflow_dispatch:

  repository_dispatch:
    types: [backup]

jobs:
  backup:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0   # 🔥 IMPORTANT

      - name: Fetch & Format JSON
        run: |
          curl "https://opjat-2005-default-rtdb.asia-southeast1.firebasedatabase.app/.json" | jq '.' > backup.json

      - name: Create backup folder
        run: mkdir -p backups

      - name: Save backup
        run: |
          DATE=$(date +'%Y-%m-%d_%H-%M-%S')
          cp backup.json backups/backup_$DATE.json

      # 🔥 FIXED DELETE LOGIC
      - name: Keep last 10 backups
        run: |
          cd backups
          ls -1t *.json 2>/dev/null | tail -n +11 | xargs rm -f || true

      # 🔥 FORCE ADD ALL FILES
      - name: Commit & Push
        run: |
          git config --global user.name "backup-bot"
          git config --global user.email "backup@bot.com"
          git add backups/
          git commit -m "Backup $(date +'%Y-%m-%d %H:%M:%S')" || echo "No changes"
          git push
name: Firebase Backup

on:
  repository_dispatch:
    types: [backup]

jobs:
  backup:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Create backup file
        run: |
          mkdir -p backups
          echo '${{ github.event.client_payload.data }}' > backups/backup_$(date +%Y-%m-%d_%H-%M-%S).json

      - name: Commit & Push
        run: |
          git config user.name "backup-bot"
          git config user.email "backup@bot.com"
          git add backups/
          git commit -m "Auto backup $(date)" || echo "No changes"
          git push
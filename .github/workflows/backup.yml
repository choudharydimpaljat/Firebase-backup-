name: Firebase Backup

on:
  schedule:
    - cron: "0 */6 * * *"   # (optional) har 6 ghante auto backup

  workflow_dispatch:        # 🔥 ye add karo → Run button ke liye

  repository_dispatch:
    types: [backup]         # 🔥 admin panel trigger ke liye

jobs:
  backup:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Fetch Firebase JSON
        run: |
          curl -o backup.json "https://opjat-2005-default-rtdb.asia-southeast1.firebasedatabase.app/.json"

      - name: Create backup folder
        run: mkdir -p backups

      - name: Save with timestamp
        run: |
          DATE=$(date +'%Y-%m-%d_%H-%M-%S')
          cp backup.json backups/backup_$DATE.json

      - name: Keep last 10 backups
        run: |
          cd backups
          ls -t | tail -n +11 | xargs rm -f || true

      - name: Commit & Push
        run: |
          git config --global user.name "backup-bot"
          git config --global user.email "backup@bot.com"
          git add backups/
          git commit -m "Backup $(date)" || echo "No changes"
          git push
